<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swasth-Derma Visual Workflow</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
           SVG Infographic 
           Dimensions: 1200x600 (2:1 aspect ratio, great for Word docs)
        -->
        <svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Gradients -->
                <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#eef2ff;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
                </linearGradient>
                <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                    <feOffset dx="2" dy="2" result="offsetblur"/>
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.3"/>
                    </feComponentTransfer>
                    <feMerge> 
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/> 
                    </feMerge>
                </filter>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
                </marker>
                <clipPath id="clip-mv" clipPathUnits="objectBoundingBox">
                    <rect x="0" y="0" width="1" height="1" rx="0.08" ry="0.08"/>
                </clipPath>
            </defs>

            <!-- Background -->
            <rect width="1200" height="600" fill="url(#bg-gradient)" rx="20" />

            <!-- Header -->
            <text x="50" y="60" font-size="28" font-weight="800" fill="#0f172a">स्वस्थ-Derma</text>
            <text x="50" y="90" font-size="16" fill="#64748b">AI-Powered Pre-Medical Triage & Hygiene Guidance</text>
            
            <!-- Top Right Acknowledgement -->
            <g transform="translate(900, 40)">
                <rect x="0" y="0" width="250" height="40" rx="20" fill="#e0f2fe" />
                <text x="125" y="25" font-size="12" text-anchor="middle" fill="#0369a1" font-weight="600">80.2% Accuracy (Tested on 468 Cases)</text>
            </g>

            <!-- STEP 1: CAPTURE -->
            <g transform="translate(100, 180)">
                <!-- Title -->
                <text x="100" y="-30" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">1. SCAN</text>
                
                <!-- Circle BG -->
                <circle cx="100" cy="120" r="100" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#dropShadow)"/>
                
                <!-- Arm Illustration -->
                <path d="M 50 195 Q 70 120 130 85 Q 155 70 170 90" stroke="#f7b4a7" stroke-width="32" stroke-linecap="round" fill="none" opacity="0.8"/>
                <path d="M 125 95 Q 150 105 168 130" stroke="#f3a89a" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.8"/>
                <ellipse cx="170" cy="135" rx="16" ry="12" fill="#f7b4a7" opacity="0.8"/>
                <!-- Lesion -->
                <circle cx="110" cy="115" r="8" fill="#ef4444" />
                
                <!-- Phone -->
                <rect x="70" y="60" width="60" height="100" rx="8" fill="#334155" stroke="white" stroke-width="2"/>
                <rect x="75" y="65" width="50" height="90" rx="4" fill="#f1f5f9"/>
                <!-- Scan Lines on phone -->
                <rect x="80" y="80" width="40" height="40" rx="2" stroke="#0ea5e9" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
                
                <!-- Labels -->
                <text x="100" y="250" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Patient / Health Worker</text>
                <text x="100" y="270" text-anchor="middle" font-size="12" fill="#64748b">Captures 1-3 Photos</text>
                <text x="100" y="285" text-anchor="middle" font-size="12" fill="#64748b">(Context + Close-up)</text>
            </g>

            <!-- ARROW 1 -->
            <path d="M 230 300 L 330 300" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="8,4"/>

            <!-- STEP 2: PROCESS -->
            <g transform="translate(360, 180)">
                <text x="240" y="-30" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">2. PROCESS</text>
                
                <!-- The "Black Box" Container -->
                <rect x="0" y="20" width="480" height="200" rx="15" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#dropShadow)"/>
                
                <!-- Input Frames (Multiple Instance) -->
                <g transform="translate(30, 70)">
                    <image x="-6" y="-22" width="50" height="60" href="../../assets/img/gab2/close_up.jpeg" clip-path="url(#clip-mv)" preserveAspectRatio="xMidYMid slice"/>
                    <rect x="-6" y="-22" width="50" height="60" fill="none" stroke="#94a3b8" rx="4"/>
                    <image x="20" y="20" width="50" height="60" href="../../assets/img/gab2/context.jpeg" clip-path="url(#clip-mv)" preserveAspectRatio="xMidYMid slice"/>
                    <rect x="20" y="20" width="50" height="60" fill="none" stroke="#64748b" rx="4"/>
                    <image x="46" y="60" width="50" height="60" href="../../assets/img/gab2/angled.jpeg" clip-path="url(#clip-mv)" preserveAspectRatio="xMidYMid slice"/>
                    <rect x="46" y="60" width="50" height="60" fill="none" stroke="#475569" rx="4"/>
                    <text x="40" y="110" font-size="12" text-anchor="middle" fill="#475569">Multi-View</text>
                </g>

                <!-- Neural Network Visualization -->
                <g transform="translate(150, 60)">
                    <!-- Layer 1 -->
                    <circle cx="20" cy="20" r="6" fill="#0ea5e9"/>
                    <circle cx="20" cy="60" r="6" fill="#0ea5e9"/>
                    <circle cx="20" cy="100" r="6" fill="#0ea5e9"/>
                    <!-- Layer 2 -->
                    <circle cx="80" cy="40" r="8" fill="#0284c7"/>
                    <circle cx="80" cy="80" r="8" fill="#0284c7"/>
                    <!-- Layer 3 -->
                    <circle cx="140" cy="60" r="10" fill="#0c4a6e"/>
                    
                    <!-- Connections -->
                    <line x1="20" y1="20" x2="80" y2="40" stroke="#bae6fd" stroke-width="2"/>
                    <line x1="20" y1="60" x2="80" y2="40" stroke="#bae6fd" stroke-width="2"/>
                    <line x1="20" y1="60" x2="80" y2="80" stroke="#bae6fd" stroke-width="2"/>
                    <line x1="20" y1="100" x2="80" y2="80" stroke="#bae6fd" stroke-width="2"/>
                    <line x1="80" y1="40" x2="140" y2="60" stroke="#38bdf8" stroke-width="2"/>
                    <line x1="80" y1="80" x2="140" y2="60" stroke="#38bdf8" stroke-width="2"/>
                </g>

                <!-- Text Labels -->
                <text x="390" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Deep Learning</text>
                <text x="390" y="110" text-anchor="middle" font-size="12" fill="#475569">Multiple Instance Learning</text>
                <text x="390" y="130" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">
                    <tspan fill="#7f1d1d">Infectious</tspan>
                    <tspan fill="#64748b"> vs </tspan>
                    <tspan fill="#a16207" font-size="13" font-weight="600">Non-Infectious</tspan>
                </text>
                
                <!-- Bottom label -->
                <rect x="150" y="180" width="180" height="30" rx="15" fill="#f0f9ff" stroke="#bae6fd"/>
                <text x="240" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#0284c7">On-Device / Secure</text>
            </g>

            <!-- ARROW 2 -->
            <path d="M 860 300 L 940 300" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="8,4"/>

            <!-- STEP 3: TRIAGE & ACTION -->
            <g transform="translate(900, 180)">
                <text x="100" y="-30" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">3. ACTION</text>
                
                <!-- Phone Result -->
                <rect x="40" y="20" width="120" height="220" rx="12" fill="white" stroke="#334155" stroke-width="4"/>
                
                <!-- Screen Content -->
                <rect x="45" y="25" width="110" height="210" rx="8" fill="#fef2f2"/>
                
                <!-- Alert Icon -->
                <circle cx="100" cy="70" r="20" fill="#ef4444"/>
                <text x="100" y="78" text-anchor="middle" font-size="20" fill="white" font-weight="bold">!</text>
                
                <text x="100" y="110" text-anchor="middle" font-size="14" font-weight="800" fill="#b91c1c">Likely Infectious</text>
                <text x="100" y="130" text-anchor="middle" font-size="10" fill="#7f1d1d">Risk Detected</text>

                <!-- Action Buttons -->
                <rect x="55" y="150" width="90" height="25" rx="4" fill="#ffffff" stroke="#fca5a5"/>
                <text x="100" y="167" text-anchor="middle" font-size="9" font-weight="600" fill="#b91c1c">Visit Clinic</text>
                
                <rect x="55" y="185" width="90" height="25" rx="4" fill="#ffffff" stroke="#fca5a5"/>
                <text x="100" y="202" text-anchor="middle" font-size="9" font-weight="600" fill="#b91c1c">Hygiene Tips</text>

                <!-- External Labels -->
                <text x="100" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Public Health Nudge</text>
                <g transform="translate(30, 290)">
                    <circle cx="10" cy="5" r="4" fill="#10b981"/>
                    <text x="20" y="9" font-size="12" fill="#334155">Limit Spread</text>
                </g>
                <g transform="translate(30, 310)">
                    <circle cx="10" cy="5" r="4" fill="#10b981"/>
                    <text x="20" y="9" font-size="12" fill="#334155">Seek Care Early</text>
                </g>
            </g>

            <!-- Bottom Tech Footer -->
            <line x1="50" y1="530" x2="1150" y2="530" stroke="#e2e8f0" stroke-width="2"/>
            <text x="600" y="555" text-anchor="middle" font-size="12" fill="#94a3b8">
                <tspan x="600" dy="0">Infectious: Folliculitis, Impetigo, Tinea (Ringworm), Herpes Zoster.</tspan>
                <tspan x="600" dy="16">Non-Infectious: Eczema, Allergic Contact Dermatitis, Urticaria, Insect Bite, Psoriasis, Drug Rash.</tspan>
            </text>

        </svg>
    </div>

</body>
</html>
