<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swasth-Derma Visual Workflow</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        svg {
            display: block;
        }

        .anim {
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
            animation-fill-mode: forwards;
        }

        .delay-1 { animation-delay: 1s; }
        .delay-2 { animation-delay: 2s; }
        .delay-3 { animation-delay: 3s; }
        .delay-4 { animation-delay: 4s; }
        .delay-5 { animation-delay: 5s; }
        .delay-6 { animation-delay: 6s; }
        .delay-7 { animation-delay: 7s; }
        .delay-8 { animation-delay: 8s; }
        .delay-9 { animation-delay: 9s; }
        .delay-10 { animation-delay: 10s; }
        .delay-11 { animation-delay: 11s; }
        .delay-12 { animation-delay: 12s; }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 
           SVG Infographic 
           Dimensions: 1200x600 (2:1 aspect ratio, great for Word docs)
        -->
        <svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Gradients -->
                <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#eef2ff;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
                </linearGradient>
                <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                    <feOffset dx="2" dy="2" result="offsetblur" />
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.3" />
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"
                    markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
                </marker>
                <clipPath id="clip-mv" clipPathUnits="objectBoundingBox">
                    <rect x="0" y="0" width="1" height="1" rx="0.08" ry="0.08" />
                </clipPath>
            </defs>

            <!-- Background -->
            <rect width="1200" height="600" fill="url(#bg-gradient)" rx="20" />

            <!-- Header -->
            <image x="50" y="25" width="36" height="36" href="../../assets/img/pelliscope.png"
                preserveAspectRatio="xMidYMid meet" />
            <text x="95" y="60" font-size="28" font-weight="800" fill="#0f172a">PelliScope</text>
            <text x="95" y="90" font-size="16" fill="#64748b">AI-Powered Pre-Medical Triage & Hygiene Guidance</text>

            <!-- Top Right Acknowledgement -->
            <g class="anim delay-12" transform="translate(880, 35)">
                <rect x="0" y="0" width="290" height="50" rx="24" fill="#e0f2fe" />
                <text x="145" y="32" font-size="14" text-anchor="middle" fill="#0369a1" font-weight="600">80.2% Accuracy
                    (Tested on 468 Cases)</text>
            </g>

            <!-- STEP 1: CAPTURE -->
            <g class="anim delay-1" transform="translate(100, 180)">
                <!-- Title -->
                <text x="100" y="-30" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">1.
                    SCAN</text>

                <!-- Circle BG -->
                <circle cx="100" cy="120" r="115" fill="white" stroke="#e2e8f0" stroke-width="2"
                    filter="url(#dropShadow)" />

                <!-- Minimalist Back/Shoulder View -->
                <g transform="translate(100, 120)">
                    <!-- Head -->
                    <ellipse cx="0" cy="-60" rx="30" ry="34" fill="#f4b4a5" />
                    <!-- Neck -->
                    <rect x="-15" y="-35" width="30" height="20" fill="#f4b4a5" />
                    <!-- Torso/Shoulders -->
                    <path d="M -70 80 
                             Q -70 -10 -25 -10 
                             L 25 -10 
                             Q 70 -10 70 80 
                             Z" fill="#f4b4a5" />
                    <!-- Shoulder highlight -->
                    <path d="M 30 10 Q 55 10 60 40" stroke="#ca8a7b" stroke-width="3" fill="none"
                        opacity="0.4" stroke-linecap="round" />
                    <!-- Lesion -->
                    <circle cx="45" cy="25" r="7" fill="#ef4444" stroke="white" stroke-width="1" />
                </g>

                <!-- Phone (aligned to shoulder) -->
                <g transform="translate(120, 60) rotate(-10)">
                    <rect x="0" y="0" width="60" height="100" rx="8" fill="#334155" stroke="white" stroke-width="2" />
                    <rect x="4" y="4" width="52" height="92" rx="4" fill="#f1f5f9" />
                    <rect x="10" y="20" width="40" height="40" rx="2" stroke="#0ea5e9" stroke-width="2"
                        fill="#0ea5e9" fill-opacity="0.12" stroke-dasharray="3,3" />
                </g>

                <!-- Scanning Beam Lines -->
                <g transform="translate(145, 125)">
                    <line x1="-30" y1="-20" x2="0" y2="0" stroke="#0ea5e9" stroke-width="1"
                        stroke-dasharray="2,2" opacity="0.6" />
                    <line x1="-30" y1="20" x2="0" y2="0" stroke="#0ea5e9" stroke-width="1"
                        stroke-dasharray="2,2" opacity="0.6" />
                </g>

                <!-- Labels -->
                <text x="100" y="265" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Patient /
                    Health Worker</text>
                <text x="100" y="288" text-anchor="middle" font-size="12" fill="#64748b">Captures 1-3 Photos</text>
                <text x="100" y="306" text-anchor="middle" font-size="12" fill="#64748b">(Context + Close-up)</text>
            </g>

            <!-- ARROW 1 -->
            <path class="anim delay-2" d="M 250 300 L 350 300" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"
                stroke-dasharray="8,4" />

            <!-- STEP 2: PROCESS -->
            <g transform="translate(360, 180)">
                <text class="anim delay-3" x="240" y="-30" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">2.
                    PROCESS</text>

                <!-- The "Black Box" Container -->
                <rect class="anim delay-4" x="0" y="20" width="480" height="260" rx="15" fill="white" stroke="#e2e8f0" stroke-width="2"
                    filter="url(#dropShadow)" />

                <!-- Input Frames (Multiple Instance) -->
                <g class="anim delay-5" transform="translate(30, 70)">
                    <image x="-12" y="-32" width="60" height="72" href="../../assets/img/gab2/close_up.jpeg"
                        clip-path="url(#clip-mv)" preserveAspectRatio="xMidYMid slice" />
                    <rect x="-12" y="-32" width="60" height="72" fill="none" stroke="#94a3b8" rx="5" />
                    <image x="28" y="18" width="60" height="72" href="../../assets/img/gab2/context.jpeg"
                        clip-path="url(#clip-mv)" preserveAspectRatio="xMidYMid slice" />
                    <rect x="28" y="18" width="60" height="72" fill="none" stroke="#64748b" rx="5" />
                    <image x="68" y="78" width="60" height="72" href="../../assets/img/gab2/angled.jpeg"
                        clip-path="url(#clip-mv)" preserveAspectRatio="xMidYMid slice" />
                    <rect x="68" y="78" width="60" height="72" fill="none" stroke="#475569" rx="5" />
                    <text x="55" y="170" font-size="12" text-anchor="middle" fill="#475569">Multi-View</text>
                </g>

                <!-- Neural Network Visualization -->
                <g class="anim delay-6" transform="translate(190, 60)">
                    <rect x="0" y="0" width="140" height="120" rx="10" fill="#f8fafc" stroke="#e2e8f0" />
                    <!-- Layer 1 -->
                    <circle cx="20" cy="20" r="6" fill="#0ea5e9" />
                    <circle cx="20" cy="60" r="6" fill="#0ea5e9" />
                    <circle cx="20" cy="100" r="6" fill="#0ea5e9" />
                    <!-- Layer 2 -->
                    <circle cx="65" cy="40" r="8" fill="#0284c7" />
                    <circle cx="65" cy="80" r="8" fill="#0284c7" />
                    <!-- Layer 3 -->
                    <circle cx="110" cy="60" r="10" fill="#0c4a6e" />

                    <!-- Connections -->
                    <line x1="20" y1="20" x2="65" y2="40" stroke="#bae6fd" stroke-width="2" />
                    <line x1="20" y1="60" x2="65" y2="40" stroke="#bae6fd" stroke-width="2" />
                    <line x1="20" y1="60" x2="65" y2="80" stroke="#bae6fd" stroke-width="2" />
                    <line x1="20" y1="100" x2="65" y2="80" stroke="#bae6fd" stroke-width="2" />
                    <line x1="65" y1="40" x2="110" y2="60" stroke="#38bdf8" stroke-width="2" />
                    <line x1="65" y1="80" x2="110" y2="60" stroke="#38bdf8" stroke-width="2" />
                </g>

                <!-- Text Labels -->
                <text class="anim delay-7" x="390" y="134" text-anchor="middle" font-size="13">
                    <tspan fill="#ef4444" font-weight="700">Infectious</tspan>
                    <tspan fill="#64748b"> vs</tspan>
                </text>
                <text class="anim delay-7" x="390" y="151" text-anchor="middle" font-size="13">
                    <tspan fill="#a16207" font-weight="600">Non-Infectious</tspan>
                </text>

                <!-- Bottom Labels -->
                <text class="anim delay-6" x="260" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Skin
                    Foundation Model</text>
                <text class="anim delay-6" x="260" y="240" text-anchor="middle" font-size="12" fill="#475569">
                    <tspan x="260" dy="0">Attention based Multiple</tspan>
                    <tspan x="260" dy="14">Instance Learning Classifier</tspan>
                </text>

                <!-- Bottom label removed per request -->
            </g>

            <!-- ARROW 2 -->
            <path class="anim delay-8" d="M 840 300 L 920 300" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"
                stroke-dasharray="8,4" />

            <!-- STEP 3: TRIAGE & ACTION -->
            <g transform="translate(900, 180)">
                <text class="anim delay-9" x="100" y="-30" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">3.
                    ACTION</text>

                <g class="anim delay-10">
                    <!-- Phone Result -->
                    <rect x="25" y="10" width="150" height="250" rx="14" fill="white" stroke="#334155" stroke-width="4" />

                    <!-- Screen Content -->
                    <rect x="30" y="15" width="140" height="240" rx="10" fill="#fef2f2" />

                    <!-- Alert Icon -->
                    <circle cx="100" cy="80" r="22" fill="#ef4444" />
                    <text x="100" y="88" text-anchor="middle" font-size="22" fill="white" font-weight="bold">!</text>

                    <text x="100" y="125" text-anchor="middle" font-size="14" font-weight="800" fill="#b91c1c">Likely
                        Infectious</text>
                    <text x="100" y="145" text-anchor="middle" font-size="10" fill="#7f1d1d">Risk Detected</text>

                    <!-- Action Buttons -->
                    <rect x="45" y="170" width="110" height="28" rx="5" fill="#ffffff" stroke="#fca5a5" />
                    <text x="100" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">Visit
                        Clinic</text>

                    <rect x="45" y="205" width="110" height="28" rx="5" fill="#ffffff" stroke="#fca5a5" />
                    <text x="100" y="223" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">Hygiene
                        Tips</text>

                    <!-- External Labels -->
                    <text x="100" y="290" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Public Health
                        Nudge</text>
                    <g transform="translate(30, 310)">
                        <circle cx="10" cy="5" r="4" fill="#10b981" />
                        <text x="20" y="9" font-size="12" fill="#334155">Limit Spread</text>
                    </g>
                    <g transform="translate(30, 330)">
                        <circle cx="10" cy="5" r="4" fill="#10b981" />
                        <text x="20" y="9" font-size="12" fill="#334155">Seek Care Early</text>
                    </g>
                </g>
            </g>

            <!-- Bottom Tech Footer -->
            <g class="anim delay-11">
                <line x1="50" y1="530" x2="1150" y2="530" stroke="#e2e8f0" stroke-width="2" />
                <text x="600" y="555" text-anchor="middle" font-size="12" fill="#94a3b8">
                    <tspan x="600" dy="0">Infectious: Folliculitis, Impetigo, Tinea (Ringworm), Herpes Zoster.</tspan>
                    <tspan x="600" dy="16">Non-Infectious: Eczema, Allergic Contact Dermatitis, Urticaria, Insect Bite,
                        Psoriasis, Drug Rash.</tspan>
                </text>
            </g>

        </svg>
    </div>

</body>

</html>
