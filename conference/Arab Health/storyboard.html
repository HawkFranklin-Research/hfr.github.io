<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PelliScope Kiosk Storyboard</title>
    <style>
        :root {
            --primary: #10b981; /* Emerald 500 */
            --primary-dark: #059669;
            --bg-dark: #0f172a; /* Slate 900 */
            --bg-card: #1e293b; /* Slate 800 */
            --text-light: #f8fafc;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f0f4f8; /* Match infographic bg */
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* --- Left Panel: Narrative --- */
        .left-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f4f8;
            border-right: 1px solid #cbd5e1;
            position: relative;
        }
        /* SVG Animation Classes (Sync with CSS/JS) */
        .anim { opacity: 0; transition: opacity 0.6s ease; }
        .anim.visible { opacity: 1; }

        /* --- Right Panel: Simulation --- */
        .right-panel {
            flex: 1;
            background: #0f172a; /* Dark background for contrast */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Grid Background Pattern */
        .right-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Phone Frame */
        .phone-frame {
            width: 300px;
            height: 600px;
            background: #020617;
            border-radius: 40px;
            border: 8px solid #1e293b;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            color: white;
            z-index: 10;
        }
        /* Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #000;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 20;
        }
        /* Status Bar */
        .status-bar {
            position: absolute;
            top: 5px;
            left: 0;
            right: 0;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            z-index: 20;
            font-weight: 600;
        }

        /* Screen Content Container */
        .screen-content {
            height: 100%;
            width: 100%;
            position: relative;
            background: #0f172a;
        }

        /* Generic Screen Transition Styling */
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
        }
        .screen.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .screen.exit {
            opacity: 0;
            transform: translateY(-20px);
        }

        /* --- Screens --- */
        
        /* 1. Welcome */
        .welcome-screen {
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .logo-box {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .btn-primary {
            background: white;
            color: black;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            border: none;
            margin-top: 32px;
            cursor: pointer;
        }

        /* 2. Scan */
        .scan-screen {
            background: black;
            padding: 0;
        }
        .camera-feed {
            width: 100%;
            height: 100%;
            background: #334155;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scan-overlay {
            width: 200px;
            height: 200px;
            border: 2px solid #10b981;
            border-radius: 16px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
            z-index: 5;
            position: relative;
            overflow: hidden;
        }
        .scan-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: scanMove 4s ease-in-out infinite;
        }
        @keyframes scanMove {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 3. Analyzing */
        .analyze-screen {
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #334155;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 4. Binary Result */
        .binary-screen {}
        .result-card {
            background: rgba(239, 68, 68, 0.1); /* Red tint */
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 16px;
            margin-top: 40px;
        }
        .progress-bar {
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            width: 0; /* Animate this */
            background: #ef4444;
            transition: width 1s ease-out;
        }
        .btn-unlock {
            background: #10b981;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            margin-top: auto;
        }

        /* 5. Premium Result */
        .premium-screen {}
        .diff-list {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px;
            margin-top: 10px;
        }
        .diff-item { margin-bottom: 12px; }
        .diff-bar {
            height: 6px;
            background: #334155;
            border-radius: 3px;
            margin-top: 4px;
        }
        .diff-fill {
            height: 100%;
            border-radius: 3px;
            width: 0;
            transition: width 1s ease-out;
        }

    </style>
</head>
<body>

<div class="container">
    <!-- LEFT PANEL: SVG Content (Narrative) -->
    <div class="left-panel" id="infographicHost">
        <!-- SVG content will be injected or placed here. 
             Since the SVG is large, I'm pasting a streamlined version of visual-info-animated.html here 
             but modifying IDs for JS control. -->
        <svg width="800" height="400" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                    <feOffset dx="2" dy="2" result="offsetblur" />
                    <feMerge> <feMergeNode /> <feMergeNode in="SourceGraphic" /> </feMerge>
                </filter>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" /></marker>
                <clipPath id="clip-mv"><rect x="0" y="0" width="1" height="1" rx="0.08" ry="0.08" /></clipPath>
            </defs>

            <!-- Base -->
            <rect width="1200" height="600" fill="#f0f4f8" rx="20" />
            
            <!-- Header -->
            <image x="50" y="25" width="36" height="36" href="assets/pelliscope.png" />
            <text x="95" y="60" font-size="28" font-weight="800" fill="#0f172a" font-family="Segoe UI, sans-serif">PelliScope</text>
            <text x="95" y="90" font-size="16" fill="#64748b" font-family="Segoe UI, sans-serif">AI-Powered Pre-Medical Triage</text>

            <!-- STEP 1: CAPTURE -->
            <g id="step1-group" class="anim">
                <text x="100" y="150" text-anchor="middle" font-size="18" font-weight="700" fill="#334155" font-family="sans-serif">1. SCAN</text>
                <circle cx="100" cy="280" r="100" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#dropShadow)" />
                <!-- Simple icon/graphic for Scan -->
                 <g transform="translate(60, 240) scale(2)">
                    <path d="M4 8V6a2 2 0 0 1 2-2h2 M4 16v2a2 2 0 0 0 2 2h2 M16 4h2a2 2 0 0 1 2 2v2 M16 20h2a2 2 0 0 0 2-2v-2" stroke="#0ea5e9" stroke-width="2" fill="none" />
                    <circle cx="12" cy="12" r="3" fill="#ef4444" />
                 </g>
                 <text x="100" y="420" text-anchor="middle" font-size="14" fill="#64748b" font-family="sans-serif">Patient Captures Photo</text>
            </g>

            <path id="arrow1" class="anim delay-2" d="M 220 280 L 320 280" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="8,4" />

            <!-- STEP 2: PROCESS -->
            <g id="step2-group" class="anim" transform="translate(340, 0)">
                <text x="240" y="150" text-anchor="middle" font-size="18" font-weight="700" fill="#334155" font-family="sans-serif">2. PROCESS</text>
                <rect x="0" y="180" width="480" height="200" rx="15" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#dropShadow)" />
                
                <!-- Neural Net Viz Simple -->
                <g transform="translate(190, 220)">
                    <circle cx="20" cy="20" r="6" fill="#0ea5e9" /><circle cx="20" cy="60" r="6" fill="#0ea5e9" />
                    <circle cx="70" cy="40" r="8" fill="#0284c7" />
                    <line x1="20" y1="20" x2="70" y2="40" stroke="#bae6fd" stroke-width="2" />
                    <line x1="20" y1="60" x2="70" y2="40" stroke="#bae6fd" stroke-width="2" />
                </g>
                <text x="240" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a" font-family="sans-serif">Clinical Vision Model</text>
            </g>

            <path id="arrow2" class="anim delay-8" d="M 840 280 L 920 280" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="8,4" />

            <!-- STEP 3: ACTION -->
            <g id="step3-group" class="anim" transform="translate(940, 0)">
                <text x="100" y="150" text-anchor="middle" font-size="18" font-weight="700" fill="#334155" font-family="sans-serif">3. ACTION</text>
                
                <!-- Result Card in SVG -->
                <rect x="25" y="180" width="150" height="200" rx="10" fill="white" stroke="#ef4444" stroke-width="2" />
                <text x="100" y="240" text-anchor="middle" font-size="24" fill="#ef4444" font-weight="bold" font-family="sans-serif">!</text>
                <text x="100" y="270" text-anchor="middle" font-size="14" fill="#b91c1c" font-weight="bold" font-family="sans-serif">Likely Infectious</text>
                <rect x="50" y="300" width="100" height="30" rx="5" fill="#fef2f2" stroke="#fca5a5" />
                <text x="100" y="320" text-anchor="middle" font-size="10" fill="#b91c1c" font-family="sans-serif">Visit Clinic</text>
            </g>

        </svg>
    </div>

    <!-- RIGHT PANEL: Phone Simulation -->
    <div class="right-panel">
        <div class="phone-frame">
            <div class="notch"></div>
            <div class="status-bar">
                <span>9:41</span>
                <span>5G</span>
            </div>

            <div class="screen-content">
                
                <!-- 1. Welcome -->
                <div class="screen welcome-screen active" id="screen-welcome">
                    <div class="logo-box">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    </div>
                    <h2>PelliScope</h2>
                    <p style="color:#94a3b8; font-size: 14px;">Dermatology Triage AI</p>
                    <button class="btn-primary" onclick="startDemo()">Begin Screening</button>
                </div>

                <!-- 2. Scan -->
                <div class="screen scan-screen" id="screen-scan">
                    <div class="camera-feed">
                        <div class="scan-overlay">
                            <img src="assets/scan-sample.jpeg" class="scan-img" alt="Scan">
                        </div>
                    </div>
                    <div style="position:absolute; top:80px; width:100%; text-align:center;">
                        <span style="background:rgba(0,0,0,0.6); color:white; padding:4px 12px; border-radius:12px; font-size:12px;">Align lesion</span>
                    </div>
                </div>

                <!-- 3. Analyzing -->
                <div class="screen analyze-screen" id="screen-analyzing">
                    <div class="spinner"></div>
                    <p>Analyzing tissue patterns...</p>
                    <p style="color:#64748b; font-size:12px;">Running CPU-Model</p>
                </div>

                <!-- 4. Binary Result -->
                <div class="screen binary-screen" id="screen-binary">
                    <div style="margin-top: 40px;">
                        <span style="color:#10b981; font-weight:bold; font-size:12px; text-transform:uppercase;">Triage Result</span>
                        <h1>Screening Complete</h1>
                    </div>
                    
                    <div class="result-card">
                        <div style="display:flex; justify-content:space-between; color:#fca5a5; font-size:14px; font-weight:bold;">
                            <span>Infectious</span>
                            <span>78%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 78%;"></div>
                        </div>
                    </div>

                    <button class="btn-unlock">Unlock Differential</button>
                </div>

                <!-- 5. Premium Result -->
                <div class="screen premium-screen" id="screen-premium">
                     <div style="margin-top: 40px; display:flex; justify-content:space-between; align-items:center;">
                        <h3>Analysis</h3>
                        <span style="background:rgba(16,185,129,0.2); color:#10b981; font-size:10px; padding:2px 6px; border-radius:4px;">PREMIUM</span>
                    </div>

                    <div class="diff-list">
                        <div class="diff-item">
                            <div style="display:flex; justify-content:space-between; font-size:12px;"><span>Tinea Corporis</span><span>82%</span></div>
                            <div class="diff-bar"><div class="diff-fill" style="width:82%; background:#10b981;"></div></div>
                        </div>
                        <div class="diff-item">
                            <div style="display:flex; justify-content:space-between; font-size:12px;"><span>Eczema</span><span>12%</span></div>
                            <div class="diff-bar"><div class="diff-fill" style="width:12%; background:#475569;"></div></div>
                        </div>
                    </div>
                    
                    <div style="margin-top:20px; background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.3); padding:10px; border-radius:10px;">
                        <p style="font-size:12px; color:#93c5fd; margin:0;"><strong>Rec:</strong> Use antifungal cream. Keep dry.</p>
                    </div>

                    <button class="btn-primary" style="background:transparent; border:1px solid white; color:white;">Connect Specialist</button>
                </div>

            </div>
            
            <!-- Home Bar -->
            <div style="position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:60px; height:4px; background:white; border-radius:2px; opacity:0.3;"></div>
        </div>
    </div>
</div>

<script>
    // --- Controller Logic ---
    
    // Config
    const TIMING = {
        WELCOME: 3000,
        SCAN: 3000,
        ANALYZING: 2000,
        BINARY: 4000,
        PREMIUM: 5000
    };

    const SVG_IDS = {
        scan: 'step1-group',
        process: 'step2-group',
        action: 'step3-group',
        arrows: ['arrow1', 'arrow2']
    };

    const SCREENS = ['screen-welcome', 'screen-scan', 'screen-analyzing', 'screen-binary', 'screen-premium'];
    
    let currentIndex = 0;
    
    // DOM Elements
    const screens = SCREENS.map(id => document.getElementById(id));
    
    // SVG Elements
    const step1 = document.getElementById(SVG_IDS.scan);
    const step2 = document.getElementById(SVG_IDS.process);
    const step3 = document.getElementById(SVG_IDS.action);
    const arrow1 = document.getElementById('arrow1');
    const arrow2 = document.getElementById('arrow2');

    // Helper: Reset all SVG states
    function resetSVG() {
        [step1, step2, step3, arrow1, arrow2].forEach(el => el.classList.remove('visible'));
    }

    // Helper: Switch Phone Screen
    function showScreen(index) {
        screens.forEach((s, i) => {
            if (i === index) {
                s.classList.remove('exit');
                s.classList.add('active');
            } else if (i < index) {
                s.classList.remove('active');
                s.classList.add('exit');
            } else {
                s.classList.remove('active');
                s.classList.remove('exit');
            }
        });
    }

    // --- Sequence Logic ---
    
    function runSequence() {
        // Loop logic
        // 0. Welcome (Initial state)
        // No SVG active
        showScreen(0);
        resetSVG();

        setTimeout(() => {
            // 1. Scan
            showScreen(1); // Phone: Scan
            step1.classList.add('visible'); // Left: Step 1
            
            setTimeout(() => {
                // 2. Analyzing
                showScreen(2); // Phone: Analyzing
                arrow1.classList.add('visible');
                step2.classList.add('visible'); // Left: Step 2
                
                setTimeout(() => {
                    // 3. Binary (Results)
                    showScreen(3);
                    arrow2.classList.add('visible');
                    // We keep step 2 visible or fade it? Let's keep a trail.
                    // step3 will appear now
                    step3.classList.add('visible'); 

                    setTimeout(() => {
                        // 4. Premium (Detail)
                        showScreen(4);
                        // Left panel stays on Action or highlights details? 
                        // For now, static.
                        
                        setTimeout(() => {
                            // Loop back? Or stop?
                            // Let's Loop
                            resetSVG();
                            showScreen(0);
                            currentIndex = 0;
                            // Small pause before restart
                            setTimeout(runSequence, 1000);
                            
                        }, TIMING.PREMIUM);
                    }, TIMING.BINARY);
                }, TIMING.ANALYZING);
            }, TIMING.SCAN);
        }, TIMING.WELCOME);
    }

    // Start on load
    window.onload = () => {
        // Initial state
        resetSVG();
        setTimeout(runSequence, 1000);
    };

    // Manual start override for button
    function startDemo() {
        // Reset timer loop? 
        // For simplicity, the automatic loop handles this. 
        // Creating a manual button that forces jump to Step 1.
    }

</script>
</body>
</html>
